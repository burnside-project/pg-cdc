name: Bug Report
description: Report a bug in pg-cdc
labels: ["bug", "status: needs triage"]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues for this bug
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `pg-cdc init --config pg-cdc.yml`
        2. Run `pg-cdc start --config pg-cdc.yml`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or log excerpts if applicable (redact credentials)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pg-cdc version
      placeholder: "e.g. v0.1.0 (output of `pg-cdc version`)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: pg_version
    attributes:
      label: PostgreSQL version
      placeholder: "e.g. 16.2"
    validations:
      required: true
  - type: dropdown
    id: sink
    attributes:
      label: Sink
      options:
        - filesystem
        - s3
        - gcs
        - not applicable / multiple
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase where the bug occurs
      options:
        - init (snapshot)
        - start (streaming)
        - compact
        - discover
        - catalog register
        - teardown
        - status
        - other / unsure
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go version (if building from source)
      placeholder: "e.g. 1.25.0"